commandblock:
  # Where provisioned Minecraft servers persist their world data.
  #
  #   mode: HostFolder  -> bind-mount {host_path}/{containerName} into each server's /data
  #                        (the default). Worlds live on disk where you can inspect and back
  #                        them up. When CommandBlock runs in a container, mount {host_path}
  #                        into it at the SAME path so `Delete server` can clean the folder up.
  #
  #   mode: Volume      -> each server gets a Docker named volume "{containerName}-data" instead.
  #
  # Switching modes only affects NEW servers; existing ones keep whatever bind they were made with.
  storage:
    mode: HostFolder
    host_path: /data/servers
