name: Release

# One pipeline for a published GitHub Release, in order:
#   1. sync-version  - bump application.properties to the release tag, commit it to main.
#   2. docker        - build + push the multi-arch image from the bumped main.
#
# The docker job depends on sync-version and checks out main *after* the bump, so the image is
# built from the version-bumped tree (the .NET app reads application.properties) - no version drift.

on:
  release:
    types: [published]

jobs:
  sync-version:
    name: Bump version to the release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.sync.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.MAIN_PUSH_TOKEN }}

      - name: Configure git as the maintainer
        run: |
          git config user.name "PianoNic"
          git config user.email "79938743+PianoNic@users.noreply.github.com"

      - name: Bump application.properties and merge to main
        id: sync
        env:
          GH_TOKEN: ${{ secrets.MAIN_PUSH_TOKEN }}
        run: |
          TAG_VERSION="${{ github.event.release.tag_name }}"
          # Tags ship inconsistently cased (e.g. "V2.6.2"); strip any non-digit prefix.
          TAG_VERSION="$(printf '%s' "$TAG_VERSION" | sed -E 's/^[^0-9]*//')"
          FILE_VERSION=$(grep -oP '(?<=<version>)[^<]+' application.properties)
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

          echo "Release tag version: $TAG_VERSION"
          echo "File version:        $FILE_VERSION"

          if [ "$TAG_VERSION" = "$FILE_VERSION" ]; then
            echo "Already in sync, nothing to commit."
            exit 0
          fi

          sed -i "s|<version>$FILE_VERSION</version>|<version>$TAG_VERSION</version>|" application.properties

          # main is protected, so land the bump through an admin-merged PR rather than a direct push.
          BRANCH="release-sync/$TAG_VERSION"
          TITLE="Bumped application.properties to $TAG_VERSION for release"
          git checkout -b "$BRANCH"
          git add application.properties
          git commit -m "$TITLE"
          # The release-sync branch is ephemeral (deleted on merge); a leftover from a re-run would
          # make a plain push fail with "fetch first", so force-push it.
          git push -f origin "$BRANCH"

          # gh pr create/merge go through GitHub's GraphQL API, which returns intermittent 503s
          # during incidents and aborts the whole release. The REST API is a separate backend, so
          # fall back to it for both the create and the merge when the GraphQL call fails.
          OWNER="${GITHUB_REPOSITORY%%/*}"

          if PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$TITLE" \
            --label CI/CD); then
            PR_NUMBER="${PR_URL##*/}"
          else
            echo "gh pr create failed (GraphQL degraded?); creating the PR via the REST API."
            # The PR may already exist if a prior attempt got that far before failing; look it up.
            PR_NUMBER=$(gh api -X POST "repos/$GITHUB_REPOSITORY/pulls" \
              -f title="$TITLE" -f head="$BRANCH" -f base=main -f body="$TITLE" --jq '.number' 2>/dev/null) \
              || PR_NUMBER=$(gh api "repos/$GITHUB_REPOSITORY/pulls?head=$OWNER:$BRANCH&state=open" --jq '.[0].number')
            gh api -X POST "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/labels" -f 'labels[]=CI/CD' >/dev/null 2>&1 || true
          fi

          if ! gh pr merge "$PR_NUMBER" --admin --squash --delete-branch; then
            echo "gh pr merge failed (GraphQL degraded?); merging via the REST API."
            gh api -X PUT "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/merge" -f merge_method=squash
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$BRANCH" >/dev/null 2>&1 || true
          fi

  docker:
    name: Build and push multi-arch image
    needs: sync-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # main now carries the version bump from sync-version.
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare repository name
        id: prep
        run: |
          echo "repository_lowercase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push Multi-Arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/CommandBlock.API/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ steps.prep.outputs.repository_lowercase }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ steps.prep.outputs.repository_lowercase }}:buildcache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          provenance: false
          sbom: false

