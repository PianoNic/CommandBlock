services:
  db:
    image: postgres:18.3
    container_name: commandblock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: d4vpas8w0rd13!!!
      POSTGRES_DB: commandblock
    ports:
      - "57460:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d commandblock"]
      interval: 2s
      timeout: 3s
      retries: 30

  mock-oauth2:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    container_name: commandblock-mock-oauth2
    restart: unless-stopped
    environment:
      JSON_CONFIG_PATH: /app/config.json
    volumes:
      - ./e2e/mock-oauth2-config.json:/app/config.json:ro
    ports:
      - "57538:8080"

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: commandblock-seaweedfs
    restart: unless-stopped
    command: "server -s3 -dir=/data"
    environment:
      AWS_ACCESS_KEY_ID: commandblock
      AWS_SECRET_ACCESS_KEY: seaweedfs-secret-key
    volumes:
      - seaweedfs-data:/data
    ports:
      - "58333:8333"

  commandblock:
    image: ghcr.io/pianonic/commandblock:latest
    build:
      context: .
      dockerfile: src/CommandBlock.API/Dockerfile
    container_name: commandblock
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    environment:
      Database__Provider: "Postgres"
      ConnectionStrings__CommandBlockDatabase: "Host=db;Port=5432;Database=commandblock;Username=postgres;Password=d4vpas8w0rd13!!!"
      Oidc__Authority: "http://localhost:57538/default"
      Oidc__InternalAuthority: "http://mock-oauth2:8080/default"
      Oidc__RequireHttpsMetadata: "false"
      Oidc__ClientId: commandblock
      Oidc__RedirectUri: "http://localhost:56722/"
      Oidc__PostLogoutRedirectUri: "http://localhost:56722/"
      Oidc__Scope: "openid profile email roles"
      Cors__AllowedOrigins__0: "http://localhost:56722"
      Vault__MasterKey: "2P+vvGUw5v3weZdFU04YOicpVNs9eIyRKo6NliiDR4c="
      Backup__Enabled: "true"
      Backup__S3Endpoint: "http://seaweedfs:8333"
      Backup__Bucket: "commandblock-backups"
      Backup__AccessKey: "commandblock"
      Backup__SecretKey: "seaweedfs-secret-key"
    depends_on:
      db:
        condition: service_healthy
      mock-oauth2:
        condition: service_started
      seaweedfs:
        condition: service_started
    ports:
      - "56722:8080"
      # The Minecraft router: the single public port every provisioned server is reached through.
      - "25565:25565"
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
      - ./backups:/app/backups
      - ./commandblock.yaml:/app/commandblock.yaml:ro

volumes:
  postgres-data:
  seaweedfs-data:
